<div class="booking-form-card card">
  <div class="form-header">
    <div class="form-header-icon">
      <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="12" y1="18" x2="12" y2="12"></line>
        <line x1="9" y1="15" x2="15" y2="15"></line>
      </svg>
    </div>
    <div class="form-header-text">
      <h3 class="form-title">Create New Booking</h3>
      <p class="form-subtitle">Enter property details and customer details to register a booking.</p>
    </div>
    <button type="button" class="btn-icon btn-close-header" (click)="onCancel()" aria-label="Close Form">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <form #bookingForm="ngForm" (ngSubmit)="onSubmit(bookingForm)" class="form-grid">
    <!-- Property Dropdown -->
    <div class="form-group span-full">
      <label class="form-label" for="property">Property</label>
      <select id="property" name="property" [(ngModel)]="propertyName" class="form-select" required>
        <option *ngFor="let prop of properties" [value]="prop">{{ prop }}</option>
      </select>
    </div>

    <!-- Customer Name -->
    <div class="form-group span-full">
      <label class="form-label" for="customerName">Customer Name</label>
      <input 
        id="customerName"
        name="customerName"
        type="text" 
        class="form-control" 
        placeholder="Enter customer's full name..." 
        [(ngModel)]="customerName"
        required
      />
    </div>

    <!-- Adults -->
    <div class="form-group">
      <label class="form-label" for="adults">Number of Adults</label>
      <input 
        id="adults"
        name="adults"
        type="number" 
        min="1" 
        class="form-control" 
        [(ngModel)]="adults"
        required
      />
    </div>

    <!-- Children -->
    <div class="form-group">
      <label class="form-label" for="children">Number of Children</label>
      <input 
        id="children"
        name="children"
        type="number" 
        min="0" 
        class="form-control" 
        [(ngModel)]="children"
        required
      />
    </div>

    <!-- Check-in Date -->
    <div class="form-group">
      <label class="form-label" for="checkIn">Check-in Date</label>
      <input 
        id="checkIn"
        name="checkIn"
        type="date" 
        class="form-control" 
        [(ngModel)]="checkInDate"
        required
      />
    </div>

    <!-- Check-out Date -->
    <div class="form-group">
      <label class="form-label" for="checkOut">Check-out Date</label>
      <input 
        id="checkOut"
        name="checkOut"
        type="date" 
        class="form-control" 
        [(ngModel)]="checkOutDate"
        required
      />
    </div>

    <!-- Total Payment -->
    <div class="form-group">
      <label class="form-label" for="totalPayment">Total Payment (₹)</label>
      <input 
        id="totalPayment"
        name="totalPayment"
        type="number" 
        min="0" 
        class="form-control" 
        [(ngModel)]="totalPayment"
        required
      />
    </div>

    <!-- Advance Amount -->
    <div class="form-group">
      <label class="form-label" for="advanceAmount">Advance Amount (₹)</label>
      <input 
        id="advanceAmount"
        name="advanceAmount"
        type="number" 
        min="0" 
        class="form-control" 
        [(ngModel)]="advanceAmount"
        required
      />
    </div>

    <!-- Balance Payment (Read-only) -->
    <div class="form-group span-full">
      <label class="form-label" for="balancePayment">Balance Payment (₹ - Read Only)</label>
      <input 
        id="balancePayment"
        name="balancePayment"
        type="number" 
        class="form-control" 
        [value]="balancePayment"
        readonly
      />
    </div>

    <!-- Actions Row -->
    <div class="form-actions span-full">
      <button type="button" class="btn btn-secondary btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn btn-primary btn-save" [disabled]="bookingForm.invalid">
        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        Save Booking
      </button>
    </div>
  </form>
</div>
