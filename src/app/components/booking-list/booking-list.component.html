<div class="list-container">
  <div class="booking-grid" *ngIf="bookings && bookings.length > 0; else emptyState">
    <div class="grid-item" *ngFor="let item of bookings">
      <app-booking-card [booking]="item" (cardClick)="bookingClick.emit(item)"></app-booking-card>
    </div>
  </div>
  
  <ng-template #emptyState>
    <div class="empty-state card">
      <div class="empty-icon-container">
        <svg class="icon empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </div>
      <h3 class="empty-heading">No Bookings Found</h3>
      <p class="empty-subtext">No bookings match the selected filter criteria. Try adjusting or resetting your search filters.</p>
    </div>
  </ng-template>
</div>
